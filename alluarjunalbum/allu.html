<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../babu/babu.css">
</head>
<style>
    .pawan{
        background-image:url("https://i.pinimg.com/1200x/f1/5b/92/f15b9202be47394d374d719bd2567132.jpg" );
        background-repeat: no-repeat;
        background-size: cover;
        background-position: top;
       
    }
    .music-img{
        object-fit: contain;
    }
    .title{
        font-size: 60px;
        font-weight: bold;
        background-image: url("https://i.pinimg.com/1200x/c5/28/0c/c5280cac15c18b14ec12dc5a87b1e154.jpg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        color: transparent;
        background-clip: text;

    }
</style>
<body >
    <div class="pawan">
    <div class="title" >Allu Arjun hits</div>
    <div class="music">
    <div class="container">
        <div class="c1" id="b1" data-index="0"><img src="https://cdn-icons-png.flaticon.com/128/7566/7566380.png" alt=""><span>Samajavaragamana Song </span> <span class="play"><img src="https://cdn-icons-png.flaticon.com/128/9073/9073187.png" alt="" ></span></div>
        <div class="c1" id="b2" data-index="1"><img src="https://cdn-icons-png.flaticon.com/128/7566/7566380.png" alt=""><span> Sittharala Sirapadu Song </span><span class="play"><img src="https://cdn-icons-png.flaticon.com/128/9073/9073187.png" alt="" ></span></div>
        <div class="c1" id="b3" data-index="2"><img src="https://cdn-icons-png.flaticon.com/128/7566/7566380.png" alt=""><span>Buttabomma Song</span><span class="play"><img src="https://cdn-icons-png.flaticon.com/128/9073/9073187.png" alt="" ></span></div>
        <div class="c1" id="b4" data-index="3"><img src="https://cdn-icons-png.flaticon.com/128/7566/7566380.png" alt=""><span>OMG Daddy</span><span class="play"><img src="https://cdn-icons-png.flaticon.com/128/9073/9073187.png" alt=""></span></div>
    </div>
    <div class="music-img" ><img src="https://i.pinimg.com/1200x/c5/28/0c/c5280cac15c18b14ec12dc5a87b1e154.jpg" alt="playing"></div>
    <div class="music-player">
              <div class="player-details">
                <h1><span id="player-title">Song Title</span></h1>
                <span id="player-artist">Allu Arjun Hits</span>
             </div>
   <div class="player-controls">
       <button id="prev"><img src="https://cdn-icons-png.flaticon.com/128/254/254437.png" alt=""></button>
    <button id="play-pause"><img src="https://cdn-icons-png.flaticon.com/128/483/483054.png" alt=""></button>
    <button id="next"><img  src="https://cdn-icons-png.flaticon.com/128/3567/3567831.png" alt=""></button>
  </div>
  <div class="ranges">
    <img src="https://cdn-icons-png.flaticon.com/128/3208/3208768.png">
   <input type="range" id="volume" value="100" min="0" max="100">
  <input type="range" id="progress" value="0" min="0" max="100">
<span id="current-time">0:00</span> / <span id="duration">0:00</span>

  </div>
</div>
</div>
</div>
</body>
<script src="./allu.js"></script>
</html>
